<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle ITD | Doações Recebidas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F4F8;
  --surface:#FFFFFF;
  --surface2:#F7F8FA;
  --border:rgba(0,0,0,0.07);
  --border-md:rgba(0,0,0,0.13);
  --text:#18191F;
  --text-2:#5C5F70;
  --text-3:#9EA3B5;
  --blue:#2563EB;
  --blue-light:#EEF3FD;
  --blue-border:#93B4F7;
  --green:#16A34A;
  --green-light:#DCFCE7;
  --green-border:#86EFAC;
  --amber:#D97706;
  --amber-light:#FEF3C7;
  --red:#DC2626;
  --red-light:#FEE2E2;
  --teal:#0D7C66;
  --teal-light:#CCFBF1;
  --purple:#6D28D9;
  --purple-light:#EDE9FE;
  --radius:8px;
  --radius-lg:14px;
  --radius-xl:20px;
  --shadow:0 1px 4px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.04);
  --shadow-md:0 4px 20px rgba(0,0,0,0.10);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.14);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh}

/* ── HEADER ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;padding:0 1.5rem;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,0.05)}
.hdr-logo{width:36px;height:36px;background:linear-gradient(135deg,#2563EB,#1d4ed8);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;flex-shrink:0;box-shadow:0 2px 8px rgba(37,99,235,0.3);letter-spacing:.5px}
.hdr-titles{flex:1}
.hdr-title{font-size:13px;font-weight:600;color:var(--text)}
.hdr-sub{font-size:11px;color:var(--text-3)}
.hdr-right{display:flex;align-items:center;gap:6px}
.btn-admin{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--radius);border:1.5px solid var(--border-md);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;background:var(--surface);color:var(--text-3)}
.btn-admin:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-light)}
.btn-admin.active{background:var(--amber-light);color:var(--amber);border-color:var(--amber)}
.breadcrumb{display:flex;align-items:center;gap:5px;font-size:12px}
.bc-link{color:var(--blue);cursor:pointer;font-weight:500}
.bc-link:hover{text-decoration:underline}
.bc-sep{color:var(--text-3)}
.bc-cur{color:var(--text-2);font-weight:500}

/* ── LAYOUT ── */
.body{max-width:900px;margin:0 auto;padding:1.5rem 1.25rem 4rem}
.page{display:none}
.page.active{display:block}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--radius);border:1px solid var(--border-md);font-size:12px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text-2);font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2);border-color:rgba(0,0,0,0.18)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 1px 4px rgba(37,99,235,0.2)}
.btn-primary:hover{background:#1d4ed8;border-color:#1d4ed8}
.btn-success{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 1px 4px rgba(22,163,74,0.2)}
.btn-success:hover{background:#15803d}
.btn-danger{color:var(--red);border-color:#FECACA}
.btn-danger:hover{background:var(--red-light)}
.btn-sm{padding:4px 9px;font-size:11px}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-3);cursor:pointer;margin-bottom:1.25rem;padding:4px 0;border:none;background:none;font-family:inherit;transition:color .15s}
.back-btn:hover{color:var(--text)}

/* ── SECTION ── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px;flex-wrap:wrap}
.sec-title{font-size:15px;font-weight:700;color:var(--text)}

/* ── MONTHS PAGE ── */
/* ── YEAR CARDS ── */
.year-card-cur{background:linear-gradient(135deg,#2563EB 0%,#1e40af 100%);border-radius:var(--radius-xl);padding:22px 24px;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:1.5rem;box-shadow:0 4px 20px rgba(37,99,235,0.25)}
.year-card-cur:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(37,99,235,0.32)}
.year-card-past{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;cursor:pointer;transition:all .15s;margin-bottom:7px}
.year-card-past:hover{border-color:var(--blue-border);box-shadow:var(--shadow)}
.year-card-past.has-data{border-left:3px solid var(--blue-border)}
.year-num{font-size:28px;font-weight:700;color:#fff}
.year-sub{font-size:13px;color:rgba(255,255,255,0.65);margin-top:2px}
.year-stats{display:flex;gap:16px;margin-top:10px}
.year-stat{font-size:12px;color:rgba(255,255,255,0.75)}
.year-stat strong{color:#fff}
.year-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.year-nf-count{font-size:38px;font-weight:700;color:#fff;line-height:1}
.year-nf-lbl{font-size:11px;color:rgba(255,255,255,0.65)}

/* ── MONTH CARDS ──*/
.cur-card{background:linear-gradient(135deg,#2563EB 0%,#1e40af 100%);border-radius:var(--radius-xl);padding:22px 24px;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:1.5rem;box-shadow:0 4px 20px rgba(37,99,235,0.25)}
.cur-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(37,99,235,0.32)}
.cur-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,0.18);color:#fff;border-radius:20px;font-size:11px;font-weight:600;padding:3px 10px;margin-bottom:8px}
.cur-name{font-size:26px;font-weight:700;color:#fff}
.cur-year{font-size:13px;color:rgba(255,255,255,0.65);margin-top:2px}
.cur-meta{font-size:12px;color:rgba(255,255,255,0.75);margin-top:8px}
.cur-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.cur-count{font-size:38px;font-weight:700;color:#fff;line-height:1}
.cur-count-lbl{font-size:11px;color:rgba(255,255,255,0.65);text-align:right;margin-top:2px}
.past-title{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.past-row{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;cursor:pointer;transition:all .15s;margin-bottom:7px}
.past-row:hover{border-color:var(--blue-border);box-shadow:var(--shadow)}
.past-row.has-data{border-left:3px solid var(--blue-border)}
.past-row.closed{border-left:3px solid var(--green-border)}
.past-name{font-size:13px;font-weight:600;width:80px;flex-shrink:0}
.past-total{font-size:12px;color:var(--text-2);flex:1}
.past-info{font-size:11px;color:var(--text-3)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-pending{background:var(--surface2);color:var(--text-3);border:1px solid var(--border)}
.badge-progress{background:var(--blue-light);color:var(--blue)}
.badge-done{background:var(--green-light);color:var(--green)}
.badge-alert{background:var(--red-light);color:var(--red)}
.badge-closed{background:var(--teal-light);color:var(--teal)}

/* ── BANNERS ── */
.banner{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;border-radius:var(--radius);font-size:12px;line-height:1.5;margin-bottom:14px}
.banner-info{background:var(--blue-light);color:var(--blue)}
.banner-success{background:var(--teal-light);color:var(--teal)}
.banner-warn{background:var(--amber-light);color:var(--amber)}

/* ── NF FORM ── */
.nf-form{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--blue);border-radius:var(--radius-lg);padding:18px 16px;margin-bottom:20px;box-shadow:var(--shadow)}
.nf-form-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.nf-list-title{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.date-sep{display:flex;align-items:center;gap:10px;margin:16px 0 10px;font-size:11px;font-weight:600;color:var(--text-3)}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.date-sep:first-child{margin-top:0}
.nf-grid2{display:grid;grid-template-columns:1.5fr 2fr;gap:10px;align-items:end;margin-top:10px}
.nf-grid3{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end;margin-top:10px}
.flbl{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.finput{width:100%;padding:8px 10px;border:1px solid var(--border-md);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
.finput:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,0.08)}
.ferr{font-size:11px;color:var(--red);margin-top:3px;min-height:14px}
.chave-row{display:flex;gap:7px;align-items:flex-start}
.chave-row .finput{flex:1;font-family:monospace}
.chave-feedback{font-size:11px;margin-top:4px;display:flex;align-items:center;gap:4px}
.chave-ok{color:var(--green)}
.chave-err{color:var(--red)}
.chave-cnt{color:var(--text-3)}

/* ── NF CARDS ── */
.nf-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;transition:all .15s;box-shadow:var(--shadow)}
.nf-card:hover{border-color:var(--border-md)}
.nf-card.selected{border-color:var(--blue-border);box-shadow:0 0 0 3px rgba(37,99,235,0.08)}
.nf-card-hdr{display:flex;align-items:flex-start;gap:12px;padding:14px 16px}
.nf-field-chave{font-family:monospace;font-size:10px;color:var(--text-3);word-break:break-all;line-height:1.6;cursor:text;user-select:all}
.nf-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0;margin-left:8px}
.btn-access{width:100%;justify-content:center;font-weight:600;margin-top:4px;padding:8px 14px;font-size:12px}

/* ── FILTER BAR ── */
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border-md);background:var(--surface2);color:var(--text-2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none}
.filter-chip:hover{border-color:var(--blue);color:var(--blue)}
.filter-chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.filter-chip.all{border-style:dashed}

/* ── SUP CARDS ── */
.sup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.sup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.sup-card:hover{border-color:var(--blue-border);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.sup-name{font-size:13px;font-weight:600}
.sup-cnpj{font-size:10px;color:var(--text-3);font-family:monospace;margin-top:2px}
.sup-val{font-size:17px;font-weight:700;margin-top:10px;color:var(--text)}
.sup-nfs{font-size:11px;color:var(--text-3)}
.pbar{height:4px;background:var(--surface2);border-radius:2px;margin-top:10px;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width .4s}
.plbl{font-size:10px;color:var(--text-3);margin-top:3px}

/* ── FLOW PAGE ── */
.flow{display:flex;flex-direction:column;gap:6px}

/* Step card */
.step-card{border-radius:var(--radius-lg);overflow:hidden;transition:all .15s;border:1.5px solid var(--border)}
.step-card.done{background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border-color:var(--green-border)}
.step-card.auto-done{background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border-color:var(--green-border)}
.step-card.progress{background:var(--blue-light);border-color:var(--blue-border)}
.step-card.pending{background:var(--surface);border-color:var(--border)}
.step-card.alert{background:var(--red-light);border-color:#FECACA}
.step-hdr{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer}
.step-num{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-num.done{background:var(--green);color:#fff}
.step-num.auto-done{background:var(--green);color:#fff}
.step-num.progress{background:var(--blue);color:#fff}
.step-num.pending{background:var(--surface2);color:var(--text-3)}
.step-num.alert{background:var(--red);color:#fff}
.step-info{flex:1}
.step-ttl{font-size:13px;font-weight:600}
.step-ttl.done,.step-ttl.auto-done{color:var(--green)}
.step-ttl.progress{color:var(--blue)}
.step-ttl.pending{color:var(--text-2)}
.step-ttl.alert{color:var(--red)}
.step-obs-preview{font-size:11px;color:var(--text-3);margin-top:2px;font-style:italic}
.step-chev{font-size:14px;color:var(--text-3);transition:transform .2s;flex-shrink:0}
.step-card.open .step-chev{transform:rotate(180deg)}
.step-body{display:none;padding:0 16px 16px}
.step-card.open .step-body{display:block}
.step-divider{height:1px;background:var(--border);margin-bottom:14px}

/* Step fields */
.step-fields{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.step-field{display:flex;flex-direction:column;gap:4px}
.step-field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sfinput{width:100%;padding:8px 10px;border:1px solid var(--border-md);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
.sfinput:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,0.08)}
.sftextarea{width:100%;padding:8px 10px;border:1px solid var(--border-md);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:12px;font-family:inherit;outline:none;resize:vertical;min-height:60px;transition:border-color .15s}
.sftextarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,0.08)}

/* Attach */
.attach-area{border:1.5px dashed var(--border-md);border-radius:var(--radius);padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .15s;background:var(--surface2)}
.attach-area:hover{border-color:var(--blue);background:var(--blue-light)}
.attach-file{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;font-size:11px;margin-top:6px}
.attach-name{flex:1;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-remove{color:var(--red);cursor:pointer;flex-shrink:0;font-size:14px}

/* Step action row */
.step-act{display:flex;gap:8px;align-items:center;margin-top:4px;flex-wrap:wrap}
.status-select{padding:6px 10px;border:1px solid var(--border-md);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:12px;font-family:inherit;outline:none;cursor:pointer}

/* Info btn */
.info-btn{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border-md);background:var(--surface2);color:var(--text-3);font-size:11px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;font-family:inherit;line-height:1}
.info-btn:hover,.info-btn.active{background:var(--blue-light);color:var(--blue);border-color:var(--blue-border)}
.info-pop{display:none;position:fixed;z-index:300;background:var(--surface);border:1px solid var(--border-md);border-radius:var(--radius-lg);padding:14px 16px;font-size:12px;line-height:1.6;width:280px;box-shadow:var(--shadow-lg)}
.info-pop.show{display:block}
.info-pop-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin-bottom:5px;margin-top:10px}
.info-pop-title:first-child{margin-top:0}
.info-pop-item{display:flex;align-items:flex-start;gap:6px;padding:1px 0}
.ip-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:6px;background:var(--text-3)}
.ip-dot.alert{background:var(--red)}

/* Step obs */
.step-obs{display:flex;align-items:center;gap:5px;margin-top:3px;font-size:11px;color:var(--text-3);font-style:italic}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.stat-card{background:var(--surface);border-radius:var(--radius-lg);padding:12px 14px;border:1px solid var(--border);box-shadow:var(--shadow)}
.stat-label{font-size:10px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:24px;font-weight:700;margin-top:4px}

/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--text-3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab.active{color:var(--text);border-bottom-color:var(--blue)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* History */
.hist-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.hdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.hdot.done{background:var(--green)}
.hdot.update{background:var(--blue)}
.hdot.alert{background:var(--red)}
.htext{font-size:12px;color:var(--text-2)}
.htime{font-size:10px;color:var(--text-3);margin-top:2px}

/* Divider */
.divider{height:1px;background:var(--border);margin:1.25rem 0}

/* Modals */
.overlay{display:none;position:fixed;inset:0;background:rgba(24,25,31,.5);z-index:200;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-xl);padding:1.5rem;width:100%;max-width:420px;box-shadow:var(--shadow-lg)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px}
.modal label{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px;margin-top:12px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.cwarn{background:var(--red-light);color:var(--red);border-radius:var(--radius);padding:10px 12px;font-size:12px;margin-top:12px}

.empty{text-align:center;padding:2.5rem 1rem;color:var(--text-3);font-size:13px}
.empty i{font-size:32px;display:block;margin-bottom:10px}

/* Progress connector between steps */
.step-connector{width:2px;height:10px;background:var(--border);margin:0 auto 0 22px}
</style>
</head>
<body>

<div id="info-pop" class="info-pop"></div>

<!-- MODAL EXPORTAR -->
<div class="overlay" id="ov-export">
  <div class="modal" style="max-width:400px">
    <h3><i class="ti ti-download" style="color:var(--blue);margin-right:6px"></i>Exportar dados</h3>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px">

<script>
var MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var TODAY = new Date();
var CUR_MONTH = TODAY.getMonth();
var CUR_YEAR  = TODAY.getFullYear();
var DB_KEY = 'itd_portal_2026_v2';

// 6 etapas — etapa 1 auto-concluída
var STEPS = [
  {id:1, title:'Recebimento da NF-e de Doação', auto:true,
   detail:[],
   atencao:[],
   fields:[]},
  {id:2, title:'Recibo Digital',
   detail:[],
   atencao:[],
   fields:[
     {key:'numRecibo',    label:'Número do Recibo',  type:'text',   placeholder:'Ex: RD-2024-00123'},
     {key:'numChamado',   label:'Número do Chamado', type:'text',   placeholder:'Ex: GLB-12345'},
     {key:'valorITD',     label:'Valor do ITD (R$)', type:'number', placeholder:'0,00'},
     {key:'anexo',        label:'Anexo',             type:'file'},
     {key:'obs',          label:'Observações',       type:'textarea',placeholder:'Observações sobre esta etapa...'},
   ]},
  {id:3, title:'Escrituração da NF-e',
   detail:[],
   atencao:[],
   fields:[
     {key:'obs', label:'Observações', type:'textarea', placeholder:'Observações sobre esta etapa...'},
   ]},
  {id:4, title:'Geração da Declaração ITD',
   detail:[],
   atencao:[],
   fields:[
     {key:'dtDeclaracao',  label:'Data da Declaração',      type:'date'},
     {key:'numDeclaracao', label:'Nº da Declaração',        type:'text',   placeholder:'Ex: DECL-2024-00123'},
     {key:'numGuiaITD',    label:'Nº Guia Controle ITD',   type:'text',   placeholder:'Ex: GC-2024-00456'},
     {key:'obs',           label:'Observações',             type:'textarea', placeholder:'Observações sobre esta etapa...'},
   ]},
  {id:5, title:'Retorno SEFAZ',
   detail:[],
   atencao:[],
   fields:[
     {key:'obs', label:'Observações', type:'textarea', placeholder:'Observações sobre esta etapa...'},
   ]},
  {id:6, title:'Emissão da Guia e Envio para Pagamento',
   detail:[],
   atencao:[],
   fields:[
     {key:'dtRecolhimento', label:'Data do Recolhimento', type:'date'},
     {key:'rc',             label:'RC',                   type:'text', placeholder:'Ex: RC-2024-00123'},
     {key:'oc',             label:'OC',                   type:'text', placeholder:'Ex: OC-2024-00456'},
     {key:'obs',            label:'Observações',          type:'textarea', placeholder:'Observações sobre esta etapa...'},
   ]},
  {id:7, title:'Comprovante de Pagamento',
   detail:[],
   atencao:[],
   fields:[
     {key:'dtPagamento',   label:'Data do Pagamento',    type:'date'},
     {key:'valorPago',     label:'Valor Pago (R$)',       type:'number', placeholder:'0,00'},
     {key:'anexo',         label:'Comprovante (PDF/imagem)', type:'file'},
     {key:'obs',           label:'Observações',          type:'textarea', placeholder:'Observações sobre esta etapa...'},
   ]},
];

var S = {
  pending:  {label:'Pendente',     icon:'ti-clock',           cls:'badge-pending'},
  progress: {label:'Em andamento', icon:'ti-player-play',     cls:'badge-progress'},
  done:     {label:'Concluído',    icon:'ti-check',           cls:'badge-done'},
  alert:    {label:'Atenção',      icon:'ti-alert-triangle',  cls:'badge-alert'},
};

var db  = loadDB();
var nav = {page:'months', year:CUR_YEAR, month:null, sup:null};
var _editNFIdx = null;
var _activeInfoBtn = null;
var _nfFilter = 'all';
var _nfSearch = '';

var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzlslmN_S-NpN7A5svWn863UjAtaoDlQKw11W4v16-9MKl6Ot1fGM3b3ifC0Tg-IdHd/exec';
var _syncTimeout = null;
var _syncing = false;

function loadDB() {
  try { var r=localStorage.getItem(DB_KEY); if(r) {
    var parsed = JSON.parse(r);
    if(parsed.months && !parsed.years) {
      var migrated = {years:{}, suppliers: parsed.suppliers||{}};
      migrated.years[CUR_YEAR] = {months: parsed.months};
      localStorage.setItem(DB_KEY, JSON.stringify(migrated));
      return migrated;
    }
    return parsed;
  }} catch(e){}
  var d={years:{},suppliers:{}};
  d.years[CUR_YEAR] = {months:{}};
  for(var i=0;i<12;i++) d.years[CUR_YEAR].months[i]={closed:false,closedAt:null,nfs:[],suppliers:{}};
  return d;
}

function saveDB(){
  try{ localStorage.setItem(DB_KEY,JSON.stringify(db)); }catch(e){}
  clearTimeout(_syncTimeout);
  _syncTimeout = setTimeout(syncToSheets, 500);
}

function syncToSheets(){
  if(_syncing) return;
  _syncing = true;
  showSyncStatus('Salvando...', 'saving');
  console.log('Sincronizando com Sheets...');
  fetch(SHEETS_URL, {
    method:'POST',
    redirect:'follow',
    body: JSON.stringify(db)
  }).then(function(r){
    console.log('POST status:', r.status, r.type);
    return r.text();
  }).then(function(txt){
    _syncing=false;
    console.log('Resposta do Sheets:', txt);
    var resp = null;
    try { resp = JSON.parse(txt); } catch(e){}
    if(resp && resp.ok){
      showSyncStatus('Salvo na planilha ✓', 'ok');
      setTimeout(function(){ showSyncStatus('',''); }, 3000);
    } else if(resp && resp.error){
      showSyncStatus('Erro do Sheets: '+resp.error, 'err');
      alert('O Google Sheets recusou a gravação:\n\n'+resp.error);
    } else {
      showSyncStatus('Resposta inesperada do Sheets', 'err');
      console.log('Resposta completa:', txt.substring(0,500));
    }
  }).catch(function(err){
    console.log('POST erro:', err);
    _syncing=false;
    showSyncStatus('Erro ao sincronizar', 'err');
  });
}

function loadFromSheets(callback){
  showSyncStatus('Carregando...', 'saving');
  fetch(SHEETS_URL+'?action=load', {cache:'no-store'})
  .then(function(r){ return r.json(); })
  .then(function(data){
    if(data && data.years){
      db = data;
      localStorage.setItem(DB_KEY, JSON.stringify(db));
    }
    showSyncStatus('Sincronizado ✓', 'ok');
    setTimeout(function(){ showSyncStatus('',''); }, 2000);
    if(callback) callback();
  }).catch(function(){
    showSyncStatus('Offline — usando dados locais', 'err');
    if(callback) callback();
  });
}

function showSyncStatus(msg, type){
  var el = document.getElementById('sync-status');
  if(!el) return;
  el.textContent = msg;
  el.style.color = type==='ok'?'var(--green)':type==='err'?'var(--red)':'var(--text-3)';
}

function ensureYear(year) {
  if(!db.years[year]) {
    db.years[year]={months:{}};
    for(var i=0;i<12;i++) db.years[year].months[i]={closed:false,closedAt:null,nfs:[],suppliers:{}};
    saveDB();
  }
  return db.years[year];
}

function getMonth(year, month) {
  ensureYear(year);
  return db.years[year].months[month];
}

function fmt(v){ return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtChave(c){ return c?c.substring(0,8)+'...'+c.slice(-4):''; }
function nowStr(){ return new Date().toLocaleDateString('pt-BR')+' '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function calcProg(steps){
  var done=0;
  STEPS.forEach(function(s){ if(steps[s.id]==='done'||steps[s.id]==='auto-done') done++; });
  return Math.round(done/STEPS.length*100);
}
function isFlowComplete(steps){
  return STEPS.every(function(s){ return steps[s.id]==='done'||steps[s.id]==='auto-done'; });
}
function pastOrLast(idx){
  if(idx<CUR_MONTH) return true;
  if(idx===CUR_MONTH){ var l=new Date(CUR_YEAR,CUR_MONTH+1,0).getDate(); return TODAY.getDate()>=l; }
  return false;
}
function maskCNPJ(v){
  v=v.replace(/[^0-9]/g,'').substring(0,14);
  if(v.length>12) return v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2}).*/,'$1.$2.$3/$4-$5');
  if(v.length>8)  return v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4}).*/,'$1.$2.$3/$4');
  if(v.length>5)  return v.replace(/^(\d{2})(\d{3})(\d{3}).*/,'$1.$2.$3');
  if(v.length>2)  return v.replace(/^(\d{2})(\d{3}).*/,'$1.$2');
  return v;
}
function closeOv(id){ document.getElementById(id).classList.remove('open'); }
function openOv(id){  document.getElementById(id).classList.add('open'); }

// NAV
function go(page,year,month,sup){
  nav.page=page;
  if(year!==undefined&&year!==null) nav.year=year;
  if(month!==undefined&&month!==null) nav.month=month;
  nav.sup=(sup!==undefined)?sup:null;
  render();
}
function render(){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.getElementById('page-'+nav.page).classList.add('active');
  if(nav.page!=='flow') document.title='Controle ITD | Doações Recebidas';
  renderBC(); renderHdr();
  if(nav.page==='years')  renderYears();
  if(nav.page==='months') renderMonths();
  if(nav.page==='nf')     renderNF();
  if(nav.page==='flow')   renderFlow();
}

function renderBC(){
  var bc=document.getElementById('breadcrumb');
  bc.innerHTML='';
  function mkSep(){var s=document.createElement('span');s.className='bc-sep';s.textContent='/';return s;}
  function mkCur(t){var s=document.createElement('span');s.className='bc-cur';s.textContent=t;return s;}
  function mkLnk(t,fn){var a=document.createElement('span');a.className='bc-link';a.textContent=t;a.onclick=fn;return a;}
  if(nav.page==='years'){
    bc.appendChild(mkCur('Anos anteriores'));
  } else if(nav.page==='months'){
    bc.appendChild(mkCur(String(nav.year)));
  } else if(nav.page==='nf'){
    bc.appendChild(mkLnk(String(nav.year),function(){go('months',nav.year);}));bc.appendChild(mkSep());
    bc.appendChild(mkCur(MONTHS[nav.month]));
  } else {
    bc.appendChild(mkLnk(String(nav.year),function(){go('months',nav.year);}));bc.appendChild(mkSep());
    if(nav.sup){
      bc.appendChild(mkLnk(MONTHS[nav.month],function(){go('nf',nav.year,nav.month);}));bc.appendChild(mkSep());
      var s=db.years[nav.year].months[nav.month].suppliers[nav.sup];
      bc.appendChild(mkCur(s?s.nome:nav.sup));
    } else {
      bc.appendChild(mkCur(MONTHS[nav.month]));
    }
  }
}
var _adminMode = false;
var ADMIN_PIN = '0507';

function openAdminModal(){
  document.getElementById('pin-input').value='';
  document.getElementById('pin-err').textContent='';
  openOv('ov-admin');
  setTimeout(function(){ document.getElementById('pin-input').focus(); }, 100);
}
function checkPin(){
  var pin = document.getElementById('pin-input').value;
  if(pin === ADMIN_PIN){
    _adminMode = true;
    closeOv('ov-admin');
    document.getElementById('pin-input').value='';
    renderHdr();
    render();
  } else {
    document.getElementById('pin-err').textContent='PIN incorreto. Tente novamente.';
    document.getElementById('pin-input').value='';
    document.getElementById('pin-input').focus();
  }
}
function toggleAdmin(){
  if(_adminMode){ _adminMode=false; renderHdr(); render(); }
  else openAdminModal();
}

function renderHdr(){
  var hasOtherYears=Object.keys(db.years).length>1;
  document.getElementById('hdr-right').innerHTML=
    '<button class="btn-admin'+(_adminMode?' active':'')+'" onclick="toggleAdmin()" title="'+(_adminMode?'Sair do modo administrador':'Entrar como administrador')+'">'+'<i class="ti ti-shield'+ (_adminMode?'-check':'')+'" style="font-size:13px"></i> '+(_adminMode?'Admin ativo':'Admin')+'</button>'+
    (hasOtherYears?'<button class="btn btn-sm" onclick="go(\'years\')"><i class="ti ti-calendar"></i> Anos anteriores</button>':'')+
    '<button class="btn btn-sm" onclick="openExport()"><i class="ti ti-download"></i> Exportar</button>';
}

function openExport(){
  var years=Object.keys(db.years).map(Number).sort(function(a,b){return b-a;});
  var ySel=document.getElementById('exp-year-sel');
  ySel.innerHTML='';
  years.forEach(function(y){
    var opt=document.createElement('option');opt.value=y;opt.textContent=y;
    if(y===nav.year) opt.selected=true;
    ySel.appendChild(opt);
  });
  populateMonthSel();
  updateExpPreview();
  openOv('ov-export');
  document.querySelectorAll('input[name="exp-period"],input[name="exp-fmt"]').forEach(function(el){el.onchange=function(){if(document.querySelector('input[name="exp-period"]:checked').value==='mes') populateMonthSel();updateExpPreview();};});
  ySel.onchange=function(){populateMonthSel();updateExpPreview();};
  document.getElementById('exp-mes-sel').onchange=updateExpPreview;
}

function populateMonthSel(){
  var expYear=parseInt(document.getElementById('exp-year-sel').value)||nav.year;
  ensureYear(expYear);
  var maxM=expYear===CUR_YEAR?CUR_MONTH:11;
  var sel=document.getElementById('exp-mes-sel');
  sel.innerHTML='<option value="">Selecione o mês</option>';
  for(var i=0;i<=maxM;i++){
    var md=db.years[expYear].months[i];
    if(md.nfs.length){
      var opt=document.createElement('option');opt.value=i;
      opt.textContent=MONTHS[i]+' ('+md.nfs.length+' NF-e)';sel.appendChild(opt);
    }
  }
}

function updateExpPreview(){
  var period=document.querySelector('input[name="exp-period"]:checked').value;
  var nfs=getExportNFs(period);
  var expYear=parseInt(document.getElementById('exp-year-sel').value)||nav.year;
  var prev=document.getElementById('exp-preview');
  var mesSel=document.getElementById('exp-mes-sel');
  var mesNome=mesSel.options[mesSel.selectedIndex]&&mesSel.value!==''?MONTHS[parseInt(mesSel.value)]:'';
  prev.textContent=nfs.length+' NF-e(s) serão exportadas em CSV'+
    (period==='mes'?' — '+(mesNome||'selecione o mês')+' '+expYear:' — Ano '+expYear);
}

function getExportNFs(period){
  var nfs=[];
  var expYear=parseInt(document.getElementById('exp-year-sel').value)||nav.year;
  ensureYear(expYear);
  if(period==='mes'){
    var idx=parseInt(document.getElementById('exp-mes-sel').value);
    if(!isNaN(idx)&&db.years[expYear].months[idx])
      nfs=db.years[expYear].months[idx].nfs.map(function(n){return Object.assign({},n,{mes:MONTHS[idx],ano:expYear});});
  } else {
    var maxMonth=expYear===CUR_YEAR?CUR_MONTH:11;
    for(var i=0;i<=maxMonth;i++){
      db.years[expYear].months[i].nfs.forEach(function(n){nfs.push(Object.assign({},n,{mes:MONTHS[i],ano:expYear}));});
    }
  }
  return nfs;
}

function doExport(){
  var period=document.querySelector('input[name="exp-period"]:checked').value;
  var expYear=parseInt(document.getElementById('exp-year-sel').value)||nav.year;
  var nfs=getExportNFs(period);
  if(!nfs.length){alert('Nenhuma NF-e encontrada para exportar.');return;}
  var mesSel=document.getElementById('exp-mes-sel');
  var mesNome=mesSel.value!==''?MONTHS[parseInt(mesSel.value)]:'';
  var filename='controle_itd_'+(period==='mes'?mesNome+'_'+expYear:'ano_'+expYear)+'_'+new Date().toISOString().slice(0,10);

  var cols=['Mês','Ano','Nº Nota','Chave NF-e','CNPJ','Fornecedor','Data Emissão','Valor (R$)',
    'Status Geral',
    'Nº Recibo','Nº Chamado','Valor ITD','Concluído Etapa 02',
    'Obs Escrituração','Concluído Etapa 03',
    'Data Declaração','Nº Declaração','Nº Guia ITD','Concluído Etapa 04',
    'Obs Retorno SEFAZ','Concluído Etapa 05',
    'Data Recolhimento','RC','OC','Concluído Etapa 06',
    'Data Pagamento','Valor Pago','Concluído Etapa 07'
  ];

  var rows=nfs.map(function(n){
    // Find supplier data for this NF
    var monthData=db.years[expYear]&&db.years[expYear].months[MONTHS.indexOf(n.mes)];
    var sup=monthData&&monthData.suppliers&&monthData.suppliers[n.cnpj];
    var sd=sup&&sup.stepData||{};
    var st=sup&&sup.steps||{};
    var dates=sup&&sup.stepDates||{};
    function stepDone(id){ return st[id]==='done'||st[id]==='auto-done'?'Sim':'Não'; }
    function fld(id,key){ return sd[id]&&sd[id][key]?sd[id][key]:''; }
    var status=!sup?'Sem fluxo':isFlowComplete(st)?'Concluído':'Pendente';

    return [n.mes,n.ano,n.nnota||'',n.chave,n.cnpj,n.nome,n.emissao||'',n.valor,
      status,
      fld(2,'numRecibo'),fld(2,'numChamado'),fld(2,'valorITD'),dates[2]||stepDone(2),
      fld(3,'obs'),dates[3]||stepDone(3),
      fld(4,'dtDeclaracao'),fld(4,'numDeclaracao'),fld(4,'numGuiaITD'),dates[4]||stepDone(4),
      fld(5,'obs'),dates[5]||stepDone(5),
      fld(6,'dtRecolhimento'),fld(6,'rc'),fld(6,'oc'),dates[6]||stepDone(6),
      fld(7,'dtPagamento'),fld(7,'valorPago'),dates[7]||stepDone(7)
    ].map(function(v){ return '"'+(v+'').replace(/"/g,'""')+'"'; }).join(';');
  });

  var csv='\uFEFF'+cols.map(function(c){return '"'+c+'"';}).join(';')+'\n'+rows.join('\n');
  downloadFile(csv,'text/csv;charset=utf-8',filename+'.csv');
  closeOv('ov-export');
}

function downloadFile(content,type,filename){
  var b=new Blob([content],{type:type});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=filename;a.click();
}

function setNfFilter(f){ _nfFilter=f; _nfSearch=''; renderNF(); }

function renderNFTable(md,locked){
  var tbl=document.getElementById('nf-table');
  var nfs=md.nfs;
  if(_nfFilter==='pending') nfs=nfs.filter(function(n){var s=md.suppliers[n.cnpj];return !s||!isFlowComplete(s.steps);});
  if(_nfSearch){
    var q=_nfSearch.toLowerCase();
    nfs=nfs.filter(function(n){return (n.nome||'').toLowerCase().includes(q)||(n.cnpj||'').includes(q);});
  }
  if(!nfs.length){tbl.innerHTML='<div class="empty"><i class="ti ti-file-off"></i>'+(md.nfs.length?'Nenhuma nota pendente!':'Nenhuma NF-e lançada.')+'</div>';return;}

  // Ensure flows exist
  md.nfs.forEach(function(n){
    if(!md.suppliers[n.cnpj]){
      var steps={};
      STEPS.forEach(function(s){steps[s.id]=s.auto?'auto-done':'pending';});
      md.suppliers[n.cnpj]={nome:n.nome,cnpj:n.cnpj,total:n.valor,nfs:[n],steps:steps,stepData:{},stepObs:{},history:[{msg:'Fluxo criado',time:nowStr(),type:'update'}]};
      saveDB();
    } else {
      // Fix legacy entries missing stepData or stepObs
      var sup=md.suppliers[n.cnpj];
      if(!sup.stepData) { sup.stepData={}; saveDB(); }
      if(!sup.stepObs)  { sup.stepObs={};  saveDB(); }
      // Fix legacy steps missing auto-done for step 1
      if(!sup.steps[1]||sup.steps[1]==='pending') { sup.steps[1]='auto-done'; saveDB(); }
    }
  });

  var today=new Date().toLocaleDateString('pt-BR');

  // Group by inclusao date — fix legacy NFs without date
  var grouped={};
  var groupOrder=[];
  nfs.forEach(function(n){
    if(!n.inclusao) n.inclusao=today; // legacy: treat as today
    var d=n.inclusao;
    if(!grouped[d]){grouped[d]=[];groupOrder.push(d);}
    grouped[d].push(n);
  });

  var cards=groupOrder.map(function(date){
    var dateHtml='<div class="date-sep">'+date+'</div>';
    var cardsHtml=grouped[date].map(function(n){
      var realIdx=md.nfs.indexOf(n);
      var sup=md.suppliers[n.cnpj];
      var prog=sup?calcProg(sup.steps):0;
      var done=sup?STEPS.filter(function(s){return sup.steps[s.id]==='done'||sup.steps[s.id]==='auto-done';}).length:0;
      var complete=sup&&isFlowComplete(sup.steps);
      return '<div class="nf-card'+(complete?' nf-card-complete':'')+'" id="nfc-'+realIdx+'" onclick="selectNF('+realIdx+')" style="'+(complete?'border-color:var(--green-border);background:linear-gradient(135deg,#F0FDF4,#fff)':'')+'">' +
        '<div class="nf-card-hdr">'+
          '<i class="ti ti-file-invoice" style="color:'+(complete?'var(--green)':'var(--blue)')+';font-size:17px;flex-shrink:0;margin-top:2px"></i>'+
          '<div style="flex:1;min-width:0;padding-right:8px">'+
            '<div style="font-size:15px;font-weight:700;color:'+(complete?'var(--green)':'var(--text)')+'">'+n.nome+'</div>'+
            '<div style="display:flex;align-items:center;gap:10px;margin-top:5px;flex-wrap:wrap">'+
              '<span style="font-size:12px;font-weight:600;color:'+(n.nnota?'var(--text-2)':'var(--red)')+'">Nº '+(n.nnota||'—')+'</span>'+
              '<span style="color:var(--text-3);font-size:10px">·</span>'+
              '<span style="font-size:12px;color:var(--text-2)">'+fmt(n.valor)+'</span>'+
              (n.emissao?'<span style="color:var(--text-3);font-size:10px">·</span><span style="font-size:12px;color:var(--text-2)"><i class="ti ti-calendar" style="font-size:11px"></i> '+n.emissao+'</span>':'')+
            '</div>'+
            '<div style="font-family:monospace;font-size:10px;color:var(--text-3);margin-top:4px;word-break:break-all;user-select:all;cursor:text">'+n.chave+'</div>'+
            '<div style="margin-top:8px">'+
            '<div class="pbar"><div class="pfill" style="width:'+prog+'%;background:'+(complete?'var(--green)':'var(--blue)')+'"></div></div>'+
            '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px">'+
              '<div style="font-size:10px;color:var(--text-3)">'+done+'/'+STEPS.length+' etapas'+(complete?' · <span style="color:var(--green);font-weight:600">Concluído ✓</span>':'')+'</div>'+
              (function(){
                if(complete) return '';
                var activeStep=STEPS.find(function(s){return sup&&(sup.steps[s.id]==='progress'||sup.steps[s.id]==='alert');});
                var nextStep=!activeStep?STEPS.find(function(s){return sup&&sup.steps[s.id]==='pending';}):null;
                var blocking=activeStep||nextStep;
                if(!blocking) return '';
                var st=sup?sup.steps[blocking.id]:'pending';
                var color=st==='alert'?'var(--red)':st==='progress'?'var(--blue)':'var(--text-3)';
                var icon=st==='alert'?'ti-alert-triangle':st==='progress'?'ti-player-play':'ti-clock';
                return '<div style="font-size:10px;color:'+color+';display:flex;align-items:center;gap:3px;font-weight:500">'+
                  '<i class="ti '+icon+'" style="font-size:10px"></i> '+
                  String(blocking.id).padStart(2,'0')+' '+blocking.title+'</div>';
              })()+
            '</div></div>'+
          '</div>'+
          '<div class="nf-actions">'+
            (locked?'':'<div style="display:flex;gap:4px">'+
              '<button class="btn btn-sm btn-danger" onclick="removeNF('+realIdx+');event.stopPropagation()" title="Remover"><i class="ti ti-trash"></i></button>'+
              '<button class="btn btn-sm" onclick="openEditNF('+realIdx+');event.stopPropagation()" title="Editar"><i class="ti ti-pencil"></i></button>'+
              '<button class="btn btn-sm" onclick="exportPDF(\''+n.cnpj+'\');event.stopPropagation()" title="Exportar processo em PDF" style="color:var(--red);border-color:#FECACA"><i class="ti ti-file-type-pdf"></i></button>'+
            '</div>')+
            '<button class="btn btn-primary btn-access" onclick="go(\'flow\','+nav.year+','+nav.month+',\''+n.cnpj+'\');event.stopPropagation()"><i class="ti ti-arrow-right"></i> Acessar</button>'+
          '</div>'+
        '</div></div>';
    }).join('');
    return dateHtml+cardsHtml;
  }).join('');

  tbl.innerHTML='<div class="nf-list-title"><i class="ti ti-files"></i> NF-es lançadas ('+nfs.length+')</div>'+cards;
}

function onChaveInput(v){
  v=v.replace(/[^0-9]/g,'').substring(0,44);
  document.getElementById('f-chave').value=v;
  document.getElementById('e-chave').textContent='';
  var fb=document.getElementById('chave-feedback');
  if(!v.length){fb.innerHTML='';return;}
  if(v.length===44){
    fb.innerHTML='<i class="ti ti-circle-check chave-ok"></i><span class="chave-ok">44 dígitos ✓</span>';
    document.getElementById('f-cnpj').value=maskCNPJ(v.substring(6,20));
    onCnpjInput(document.getElementById('f-cnpj').value);
  } else {
    fb.innerHTML='<span class="chave-cnt">'+v.length+' / 44</span>';
    if(v.length<20) document.getElementById('f-cnpj').value='';
  }
}
function validarChave(){
  var v=(document.getElementById('f-chave').value||'').trim();
  var fb=document.getElementById('chave-feedback');
  if(v.length===44) fb.innerHTML='<i class="ti ti-circle-check chave-ok"></i><span class="chave-ok">Chave válida — 44 dígitos confirmados</span>';
  else if(!v.length){document.getElementById('e-chave').textContent='Informe a chave NF-e';fb.innerHTML='';}
  else fb.innerHTML='<i class="ti ti-circle-x chave-err"></i><span class="chave-err">'+v.length+' dígitos — faltam '+(44-v.length)+'</span>';
}
function onCnpjInput(v){
  v=maskCNPJ(v);
  var el=document.getElementById('f-cnpj');if(el) el.value=v;
  var raw=v.replace(/[^0-9]/g,'');
  if(raw.length===14&&db.suppliers&&db.suppliers[raw]){
    var nomeEl=document.getElementById('f-nome');if(nomeEl&&!nomeEl.value) nomeEl.value=db.suppliers[raw].nome;
  }
}

function addNF(){
  var chave=(document.getElementById('f-chave').value||'').trim();
  var cnpj=(document.getElementById('f-cnpj').value||'').trim();
  var nome=(document.getElementById('f-nome').value||'').trim();
  var nnota=(document.getElementById('f-nnota').value||'').trim();
  var emissao=document.getElementById('f-emissao').value;
  var valor=parseFloat(document.getElementById('f-val').value);
  var ok=true;
  ['chave','cnpj','nome','nnota','emissao','val'].forEach(function(f){var el=document.getElementById('e-'+f);if(el)el.textContent='';});
  if(chave.length!==44){document.getElementById('e-chave').textContent='Chave deve ter 44 dígitos';ok=false;}
  if(getMonth(nav.year,nav.month).nfs.find(function(n){return n.chave===chave;})){document.getElementById('e-chave').textContent='Chave já lançada neste mês';ok=false;}
  if(cnpj.replace(/[^0-9]/g,'').length!==14){document.getElementById('e-cnpj').textContent='CNPJ inválido';ok=false;}
  if(!nome){document.getElementById('e-nome').textContent='Informe o nome';ok=false;}
  if(!nnota){document.getElementById('e-nnota').textContent='Informe o nº da nota';ok=false;}
  if(!emissao){document.getElementById('e-emissao').textContent='Informe a data de emissão';ok=false;}
  if(!valor||valor<=0){document.getElementById('e-val').textContent='Valor inválido';ok=false;}
  if(!ok) return;

  // Format date to dd/mm/yyyy for display
  var parts=emissao.split('-');
  var emissaoFmt=parts[2]+'/'+parts[1]+'/'+parts[0];

  var raw=cnpj.replace(/[^0-9]/g,'');
  if(!db.suppliers) db.suppliers={};
  db.suppliers[raw]={nome:nome,cnpj:cnpj};

  getMonth(nav.year,nav.month).nfs.push({chave:chave,cnpj:cnpj,nome:nome,nnota:nnota,valor:valor,emissao:emissaoFmt,inclusao:new Date().toLocaleDateString('pt-BR')});

  // Create supplier flow — step 1 auto-done
  var md=getMonth(nav.year,nav.month);
  if(!md.suppliers[cnpj]){
    var steps={};
    STEPS.forEach(function(s){steps[s.id]=s.auto?'auto-done':'pending';});
    md.suppliers[cnpj]={nome:nome,cnpj:cnpj,total:valor,nfs:[{chave:chave,cnpj:cnpj,nome:nome,nnota:nnota,valor:valor,emissao:emissaoFmt}],
      steps:steps,stepData:{},stepObs:{},
      history:[{msg:'Fluxo criado — NF-e '+fmtChave(chave)+' — '+fmt(valor)+' (Etapa 01 concluída automaticamente)',time:nowStr(),type:'done'}]};
  } else {
    md.suppliers[cnpj].total+=valor;
    md.suppliers[cnpj].nfs.push({chave:chave,cnpj:cnpj,nome:nome,valor:valor,emissao:emissaoFmt});
    md.suppliers[cnpj].history.push({msg:'NF-e adicionada — '+fmtChave(chave)+' — '+fmt(valor),time:nowStr(),type:'update'});
  }
  saveDB();
  ['f-chave','f-cnpj','f-nome','f-nnota','f-val'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('f-emissao').value='';
  document.getElementById('chave-feedback').innerHTML='';
  renderNF();
}

function removeNF(i){
  var md=getMonth(nav.year,nav.month);
  var nf=md.nfs[i];
  if(!confirm('Remover a NF-e de "'+nf.nome+'"?\n\nValor: '+fmt(nf.valor)+'\nChave: '+fmtChave(nf.chave)+'\n\nEsta ação também removerá todo o fluxo de etapas do fornecedor neste mês.')) return;
  md.nfs.splice(i,1);
  var remaining=md.nfs.filter(function(n){return n.cnpj===nf.cnpj;});
  if(!remaining.length){
    delete md.suppliers[nf.cnpj];
  } else {
    var sup=md.suppliers[nf.cnpj];
    if(sup){
      sup.total=remaining.reduce(function(a,n){return a+n.valor;},0);
      sup.nfs=remaining;
      sup.history.push({msg:'NF-e removida — '+fmtChave(nf.chave),time:nowStr(),type:'update'});
    }
  }
  saveDB();renderNF();
}

function selectNF(i){
  document.querySelectorAll('.nf-card').forEach(function(c){c.classList.remove('selected');});
  var card=document.getElementById('nfc-'+i);if(card) card.classList.add('selected');
}

function saveEditNF(){

  var nome=(document.getElementById('edit-nome').value||'').trim();

  if(cnpj.replace(/[^0-9]/g,'').length!==14){document.getElementById('edit-e-cnpj').textContent='CNPJ inválido';ok=false;}
  if(!valor||valor<=0){document.getElementById('edit-e-valor').textContent='Valor inválido';ok=false;}

  var md=getMonth(nav.year,nav.month);
  var nf=md.nfs[_editNFIdx];
  var oldCnpj=nf.cnpj;
  nf.chave=chave;nf.nnota=nnota;nf.nome=nome;nf.cnpj=cnpj;nf.valor=valor;

  db.suppliers[cnpj.replace(/[^0-9]/g,'')]={nome:nome,cnpj:cnpj};

// ── FLOW ──
function renderFlow(){
  var md=getMonth(nav.year,nav.month);
  if(!nav.sup){renderFlowList(md);return;}
  var sup=md.suppliers[nav.sup];
  if(!sup){go('nf');return;}
  var nf=md.nfs.find(function(n){return n.cnpj===nav.sup;});

  // Update browser title with supplier name
  document.title = sup.nome + ' — Controle ITD';

  var prog=calcProg(sup.steps);
  var done=STEPS.filter(function(s){return sup.steps[s.id]==='done'||sup.steps[s.id]==='auto-done';}).length;
  var inprog=STEPS.filter(function(s){return sup.steps[s.id]==='progress';}).length;
  var alert=STEPS.filter(function(s){return sup.steps[s.id]==='alert';}).length;

  var stepsHtml=STEPS.map(function(s,idx){return renderStep(s,sup.steps[s.id],sup.stepObs&&sup.stepObs[s.id],sup.stepData&&sup.stepData[s.id],nav.sup)+(idx<STEPS.length-1?'<div class="step-connector"></div>':'');}).join('');
  var hist=sup.history.slice().reverse().map(function(h){
    return '<div class="hist-item"><div class="hdot '+h.type+'"></div><div><div class="htext">'+h.msg+'</div><div class="htime">'+h.time+'</div></div></div>';
  }).join('')||'<div class="empty">Nenhuma atualização.</div>';

  document.getElementById('flow-body').innerHTML=
    backBtn('Voltar para '+MONTHS[nav.month],'nf',nav.year,nav.month)+
    '<div class="stats-grid">'+
    '<div class="stat-card"><div class="stat-label">Progresso</div><div class="stat-value" style="color:var(--blue)">'+prog+'%</div></div>'+
    '<div class="stat-card"><div class="stat-label">Concluídas</div><div class="stat-value" style="color:var(--green)">'+done+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Em andamento</div><div class="stat-value" style="color:var(--blue)">'+inprog+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Atenção</div><div class="stat-value" style="color:var(--red)">'+alert+'</div></div>'+
    '</div>'+
    '<div class="banner banner-info" style="margin-bottom:16px"><i class="ti ti-building"></i>'+
    '<div style="flex:1">'+
      '<div style="font-size:14px;font-weight:700">'+( nf&&nf.nnota?'Nº '+nf.nnota+' · ':'')+sup.nome+'</div>'+
      '<div style="margin-top:3px;font-size:12px;opacity:.85">'+sup.cnpj+' · '+fmt(sup.total)+(nf&&nf.emissao?' · '+nf.emissao:'')+'</div>'+
      (nf?'<div style="font-family:monospace;font-size:10px;opacity:.65;margin-top:3px;user-select:all;cursor:text">'+nf.chave+'</div>':'')+
    '</div></div>'+
    '<div class="tabs"><button class="tab active" onclick="swTab(\'t-steps\',this)">Etapas</button><button class="tab" onclick="swTab(\'t-hist\',this)">Histórico</button></div>'+
    '<div class="tab-panel active" id="t-steps"><div class="flow">'+stepsHtml+'</div></div>'+
    '<div class="tab-panel" id="t-hist">'+hist+'</div>';
}

function renderStep(s,status,obs,stepData,cnpj){
  var st=status||'pending';
  var cfg=S[st]||S.pending;
  var isAuto=st==='auto-done';
  // Get conclusion date
  var sup=cnpj?getMonth(nav.year,nav.month).suppliers[cnpj]:null;
  var doneDate=sup&&sup.stepDates&&sup.stepDates[s.id]?sup.stepDates[s.id]:'';
  return '<div class="step-card '+st+'" id="sc-'+s.id+'">'+
    '<div class="step-hdr" onclick="togStep('+s.id+')" '+(s.auto?'style="cursor:default"':'')+'>'+
    '<div class="step-num '+st+'">'+String(s.id).padStart(2,'0')+'</div>'+
    '<div class="step-info">'+
      '<div class="step-ttl '+st+'">'+s.title+(isAuto?' <span style="font-size:10px;font-weight:400;opacity:.7">(automática)</span>':'')+'</div>'+
      (obs?'<div class="step-obs"><i class="ti ti-message-2"></i> '+obs+'</div>':'')+
      ((st==='done'||st==='auto-done')&&doneDate?'<div style="font-size:10px;color:var(--green);margin-top:2px"><i class="ti ti-check"></i> Concluído em '+doneDate+'</div>':'')+
    '</div>'+
    (!s.auto?'<button class="info-btn" id="ib-'+s.id+'" onclick="toggleInfoPop(event,'+s.id+')" title="Atividades e pontos de atenção">i</button>':'<span></span>')+
    '<span class="badge '+cfg.cls+'"><i class="ti '+cfg.icon+'"></i> '+(isAuto?'Concluído':cfg.label)+'</span>'+
    (!s.auto?'<span class="step-chev"><i class="ti ti-chevron-down"></i></span>':'')+
    '</div>'+
    (!s.auto?
      '<div class="step-body">'+
      '<div class="step-divider"></div>'+
      renderStepFields(s,st,stepData,obs,cnpj)+
      '</div>':'')+
  '</div>';
}

function renderStepFields(s,status,stepData,obs,cnpj){
  var sd=stepData||{};
  var html='<div class="step-fields">';
  s.fields.forEach(function(f){
    if(f.key==='obs') return; // handle obs separately at bottom
    if(f.type==='file'){
      html+='<div class="step-field"><div class="flbl">'+f.label+'</div>';
      if(sd.anexo_name){
        html+='<div class="attach-file">'+
          '<i class="ti ti-paperclip" style="color:var(--blue);flex-shrink:0"></i>'+
          '<span class="attach-name">'+sd.anexo_name+'</span>'+
          '<i class="ti ti-download" style="color:var(--blue);cursor:pointer;flex-shrink:0;font-size:14px" onclick="downloadAnexo('+s.id+',\''+cnpj+'\')" title="Baixar anexo"></i>'+
          '<i class="ti ti-x attach-remove" onclick="removeAnexo('+s.id+')" title="Remover"></i>'+
          '</div>';
      } else {
        html+='<label class="attach-area"><i class="ti ti-upload" style="color:var(--blue)"></i><span style="font-size:12px;color:var(--text-2)">Clique para anexar (PDF até 10MB — páginas convertidas automaticamente)</span><input type="file" style="display:none" accept=".pdf,.png,.jpg,.jpeg" onchange="handleAnexo(event,'+s.id+')"></label>';
      }
      html+='</div>';
    } else if(f.type==='date') {
      // Convert stored dd/mm/yyyy back to yyyy-mm-dd for input[type=date]
      var storedDate = sd[f.key]||'';
      var inputDate = '';
      if(storedDate && storedDate.indexOf('/')!==-1) {
        var dp=storedDate.split('/');
        if(dp.length===3) inputDate=dp[2]+'-'+dp[1]+'-'+dp[0];
      }
      html+='<div class="step-field"><div class="flbl">'+f.label+'</div>'+
        '<input class="sfinput" id="sf-'+s.id+'-'+f.key+'" type="date" value="'+inputDate+'" onblur="saveStepDate('+s.id+',\''+f.key+'\',this.value)">'+
        '</div>';
    } else {
      html+='<div class="step-field"><div class="flbl">'+f.label+'</div>'+
        '<input class="sfinput" id="sf-'+s.id+'-'+f.key+'" type="'+(f.type||'text')+'" value="'+(sd[f.key]||'')+'" placeholder="'+(f.placeholder||'')+'" onblur="saveStepField('+s.id+',\''+f.key+'\',this.value)">'+
        '</div>';
    }
  });
  // obs always last
  html+='<div class="step-field"><div class="flbl">Observações</div>'+
    '<textarea class="sftextarea" id="sf-'+s.id+'-obs" placeholder="Observações sobre esta etapa..." onblur="saveStepField('+s.id+',\'obs\',this.value)">'+(obs||'')+'</textarea></div>';
  html+='</div>';
  // Status selector
  html+='<div class="step-act">'+
    '<select class="status-select" id="ss-'+s.id+'" onchange="saveStepStatus('+s.id+',this.value)">'+
      '<option value="pending"'+(status==='pending'?'':'')+'>Pendente</option>'+
      '<option value="progress"'+(status==='progress'?' selected':'')+'>Em andamento</option>'+
      '<option value="done"'+(status==='done'||status==='pending'?' selected':'')+'>Concluído</option>'+
      '<option value="alert"'+(status==='alert'?' selected':'')+'>Requer atenção</option>'+
    '</select>'+
    '<button class="btn btn-primary btn-sm" onclick="saveStepAll('+s.id+')"><i class="ti ti-check"></i> Salvar</button>'+
  '</div>';
  return html;
}

function saveStepDate(stepId,key,val){

  var formatted='';
  if(val){var p=val.split('-');if(p.length===3) formatted=p[2]+'/'+p[1]+'/'+p[0];}
  saveStepField(stepId,key,formatted);

function saveStepField(stepId,key,val){
  var sup=getMonth(nav.year,nav.month).suppliers[nav.sup];
  if(!sup.stepData) sup.stepData={};
  if(!sup.stepData[stepId]) sup.stepData[stepId]={};
  sup.stepData[stepId][key]=val;
  if(key==='obs') sup.stepObs[stepId]=val;
  saveDB();
}

function saveStepStatus(stepId,status){
  var sup=getMonth(nav.year,nav.month).suppliers[nav.sup];
  sup.steps[stepId]=status;saveDB();
}

function saveStepAll(stepId){
  var sup=getMonth(nav.year,nav.month).suppliers[nav.sup];
  var status=document.getElementById('ss-'+stepId).value;
  var s=STEPS.find(function(x){return x.id===stepId;});
  var old=sup.steps[stepId];
  sup.steps[stepId]=status;
  // Save conclusion date if done
  if(status==='done' && old!=='done'){
    if(!sup.stepDates) sup.stepDates={};
    sup.stepDates[stepId]=nowStr();
  }
  // Save all fields
  s.fields.forEach(function(f){
    if(f.key==='obs'||f.type==='file') return;
    var el=document.getElementById('sf-'+stepId+'-'+f.key);
    if(el){
      if(!sup.stepData[stepId]) sup.stepData[stepId]={};
      if(f.type==='date'){
        var p=el.value.split('-');
        sup.stepData[stepId][f.key]=(p.length===3?p[2]+'/'+p[1]+'/'+p[0]:'');
      } else {
        sup.stepData[stepId][f.key]=el.value;
      }
    }
  });
  var obsEl=document.getElementById('sf-'+stepId+'-obs');
  if(obsEl){sup.stepObs[stepId]=obsEl.value;if(!sup.stepData[stepId])sup.stepData[stepId]={};sup.stepData[stepId].obs=obsEl.value;}
  if(old!==status) sup.history.push({msg:'Etapa '+String(stepId).padStart(2,'0')+' — '+s.title+': '+S[old].label+' → '+S[status].label,time:nowStr(),type:status==='done'?'done':status==='alert'?'alert':'update'});
  saveDB();renderFlow();
}

function handleAnexo(event,stepId){
  var file=event.target.files[0];if(!file) return;
  if(file.size>10*1024*1024){alert('Arquivo muito grande. Máximo 10MB.');return;}

  var sup=getMonth(nav.year,nav.month).suppliers[nav.sup];
  if(!sup.stepData) sup.stepData={};
  if(!sup.stepData[stepId]) sup.stepData[stepId]={};

  // Show loading indicator
  var attachArea=document.querySelector('.attach-area');
  if(attachArea) attachArea.innerHTML='<i class="ti ti-loader" style="color:var(--blue);animation:spin 1s linear infinite"></i><span style="font-size:12px;color:var(--text-2)">Processando PDF...</span>';

  var reader=new FileReader();
  reader.onload=function(e){
    var data=e.target.result;
    var isPDF=file.name.toLowerCase().endsWith('.pdf');

    if(!isPDF){
      // Image — save directly
      sup.stepData[stepId].anexo=data;
      sup.stepData[stepId].anexo_name=file.name;
      sup.stepData[stepId].anexo_pages=null;
      sup.history.push({msg:'Etapa '+String(stepId).padStart(2,'0')+' — Anexo adicionado: '+file.name,time:nowStr(),type:'update'});
      saveDB();renderFlow();
      return;
    }

    // PDF — convert each page to image using PDF.js
    var arrayBuffer=e.target.result;
    // Also store as base64 for download
    var base64Reader=new FileReader();
    base64Reader.onload=function(b64e){
      sup.stepData[stepId].anexo=b64e.target.result; // base64 for download
    };
    base64Reader.readAsDataURL(file);

    pdfjsLib.getDocument({data:arrayBuffer}).promise.then(function(pdf){
      var numPages=pdf.numPages;
      var pages=[];
      var promises=[];

      for(var i=1;i<=numPages;i++){
        promises.push((function(pageNum){
          return pdf.getPage(pageNum).then(function(page){
            var scale=1.5;
            var viewport=page.getViewport({scale:scale});
            var canvas=document.createElement('canvas');
            canvas.width=viewport.width;
            canvas.height=viewport.height;
            var ctx=canvas.getContext('2d');
            return page.render({canvasContext:ctx,viewport:viewport}).promise.then(function(){
              pages[pageNum-1]=canvas.toDataURL('image/jpeg',0.85);
            });
          });
        })(i));
      }

      Promise.all(promises).then(function(){
        sup.stepData[stepId].anexo=data; // keep original base64
        sup.stepData[stepId].anexo_name=file.name;
        sup.stepData[stepId].anexo_pages=pages; // array of page images
        sup.history.push({msg:'Etapa '+String(stepId).padStart(2,'0')+' — PDF anexado: '+file.name+' ('+numPages+' página(s))',time:nowStr(),type:'update'});
        saveDB();renderFlow();
      });
    }).catch(function(err){
      alert('Erro ao processar o PDF: '+err.message);
      renderFlow();
    });
  };

  // Read as ArrayBuffer for PDF, DataURL for images
  if(file.name.toLowerCase().endsWith('.pdf')) reader.readAsArrayBuffer(file);
  else reader.readAsDataURL(file);
}
// CSS spin animation
var styleEl=document.createElement('style');
styleEl.textContent='@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
document.head.appendChild(styleEl);
function exportPDF(cnpj){
  var md = getMonth(nav.year, nav.month);
  var sup = md.suppliers[cnpj];
  var nf  = md.nfs.find(function(n){ return n.cnpj===cnpj; });
  if(!sup||!nf) return;

  var sd = sup.stepData||{};
  var statusLabel = {'pending':'Pendente','progress':'Em andamento','done':'Concluído','auto-done':'Concluído','alert':'Requer atenção'};

  // Build steps HTML
  var stepsHtml = STEPS.map(function(s){
    var st = sup.steps[s.id]||'pending';
    var statusColor = st==='done'||st==='auto-done'?'#16A34A':st==='progress'?'#2563EB':st==='alert'?'#DC2626':'#9EA3B5';
    var sdata = sd[s.id]||{};
    var fields = s.fields.filter(function(f){ return f.type!=='file' && f.key!=='obs'; });
    var obs = sup.stepObs&&sup.stepObs[s.id]?sup.stepObs[s.id]:'';

    var fieldsHtml = fields.map(function(f){
      return sdata[f.key]?'<tr><td style="padding:4px 8px;color:#5C5F70;width:40%">'+f.label+'</td><td style="padding:4px 8px;font-weight:500">'+sdata[f.key]+'</td></tr>':'';
    }).join('');

    return '<div style="margin-bottom:14px;border:1px solid #E5E7EB;border-radius:8px;overflow:hidden">'+
      '<div style="padding:10px 14px;background:'+(st==='done'||st==='auto-done'?'#F0FDF4':st==='alert'?'#FEE2E2':'#F9FAFB')+';display:flex;align-items:center;gap:10px;border-bottom:1px solid #E5E7EB">'+
        '<span style="width:26px;height:26px;background:'+statusColor+';border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0">'+String(s.id).padStart(2,'0')+'</span>'+
        '<span style="font-weight:600;font-size:13px;flex:1">'+s.title+'</span>'+
        '<span style="font-size:11px;font-weight:500;color:'+statusColor+'">'+((st==='auto-done'?'done':st)==='done'?'✓ ':'')+statusLabel[st]+'</span>'+
      '</div>'+
      ((fieldsHtml||obs)?
        '<table style="width:100%;font-size:12px;border-collapse:collapse;padding:6px 0">'+
        fieldsHtml+
        (obs?'<tr><td style="padding:4px 8px;color:#5C5F70;width:40%;vertical-align:top">Observações</td><td style="padding:4px 8px">'+obs+'</td></tr>':'')+'</table>':'<div style="padding:8px 14px;font-size:11px;color:#9EA3B5">Sem informações registradas</div>')+
    '</div>';
  }).join('');

  // Anexo
  var anexoHtml = '';
  if(sd[2]&&sd[2].anexo&&sd[2].anexo_name){
    var isImg = /\.(png|jpg|jpeg)$/i.test(sd[2].anexo_name);
    var pages = sd[2].anexo_pages;

    anexoHtml = '<div style="margin-top:20px;border-top:2px solid #E5E7EB;padding-top:16px">'+
      '<div style="font-size:12px;font-weight:700;color:#5C5F70;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Anexo — Etapa 02 | Recibo Digital</div>';

    if(isImg){
      anexoHtml += '<img src="'+sd[2].anexo+'" style="max-width:100%;border-radius:6px;border:1px solid #E5E7EB">';
    } else if(pages&&pages.length){
      anexoHtml += pages.map(function(pg,idx){
        return '<div style="margin-bottom:12px">'+(pages.length>1?'<div style="font-size:10px;color:#9EA3B5;margin-bottom:4px;font-weight:600">PÁGINA '+(idx+1)+' DE '+pages.length+'</div>':'')+
          '<img src="'+pg+'" style="max-width:100%;border:1px solid #E5E7EB;border-radius:4px;display:block"></div>';
      }).join('');
    } else {
      anexoHtml += '<div style="background:#EEF3FD;border:1px solid #93B4F7;border-radius:6px;padding:12px 14px;font-size:12px;color:#2563EB">'+
        '📄 '+sd[2].anexo_name+' — Reprocesse o anexo no portal para visualizar as páginas</div>';
    }
    anexoHtml += '</div>';
  }

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">'+
    '<title>Processo ITD — '+sup.nome+'</title>'+
    '<style>body{font-family:Inter,system-ui,sans-serif;margin:0;padding:24px;color:#18191F;font-size:13px}'+
    '@media print{body{padding:0}@page{margin:20mm}}</style></head><body>'+
    // Header
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #2563EB">'+
      '<div><div style="font-size:10px;font-weight:700;color:#2563EB;text-transform:uppercase;letter-spacing:.5px">Controle ITD | Doações Recebidas</div>'+
      '<div style="font-size:18px;font-weight:700;margin-top:4px">'+sup.nome+'</div>'+
      '<div style="font-size:11px;color:#5C5F70;margin-top:2px">Globo Comunicação e Participações</div></div>'+
      '<div style="text-align:right;font-size:11px;color:#9EA3B5">Recebido em '+new Date().toLocaleDateString('pt-BR')+'<br>'+MONTHS[nav.month]+' '+nav.year+'</div>'+
    '</div>'+
    // NF Info
    '<div style="background:#F4F6FA;border-radius:8px;padding:12px 16px;margin-bottom:18px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px">'+
      (nf.nnota?'<div><div style="font-size:10px;color:#9EA3B5;font-weight:600;text-transform:uppercase">Nº da Nota</div><div style="font-weight:700;margin-top:2px;font-size:15px">'+nf.nnota+'</div></div>':'')+
      '<div><div style="font-size:10px;color:#9EA3B5;font-weight:600;text-transform:uppercase">CNPJ</div><div style="font-weight:600;margin-top:2px;font-family:monospace">'+nf.cnpj+'</div></div>'+
      '<div><div style="font-size:10px;color:#9EA3B5;font-weight:600;text-transform:uppercase">Valor da Doação</div><div style="font-weight:600;margin-top:2px">'+fmt(nf.valor)+'</div></div>'+
      (nf.emissao?'<div><div style="font-size:10px;color:#9EA3B5;font-weight:600;text-transform:uppercase">Data de Emissão</div><div style="font-weight:600;margin-top:2px">'+nf.emissao+'</div></div>':'<div></div>')+
      '<div style="grid-column:1/-1"><div style="font-size:10px;color:#9EA3B5;font-weight:600;text-transform:uppercase">Chave NF-e</div><div style="font-family:monospace;font-size:11px;margin-top:2px;word-break:break-all">'+nf.chave+'</div></div>'+
    '</div>'+
    // Steps
    '<div style="font-size:11px;font-weight:700;color:#9EA3B5;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Etapas do Processo</div>'+
    stepsHtml+
    // Anexo
    anexoHtml+
  '</body></html>';

  var win = window.open('','_blank','width=900,height=700');
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(function(){ win.print(); }, 600);
}

function downloadAnexo(stepId, cnpj){
  var supCnpj = cnpj || nav.sup;
  var sup = getMonth(nav.year,nav.month).suppliers[supCnpj];
  if(!sup||!sup.stepData||!sup.stepData[stepId]){
    alert('Arquivo não encontrado. Tente reanexar o PDF.');return;
  }
  var sd = sup.stepData[stepId];
  var pages = sd.anexo_pages;
  var name = sd.anexo_name||'anexo';

  if(!pages||!pages.length){
    alert('Páginas não encontradas. Reanexe o PDF para gerar a prévia.');return;
  }

  var nf = getMonth(nav.year,nav.month).nfs.find(function(n){return n.cnpj===supCnpj;});

  var pagesHtml = pages.map(function(pg,idx){
    return '<div style="margin-bottom:20px;page-break-after:'+(idx<pages.length-1?'always':'auto')+'">'+
      '<img src="'+pg+'" style="width:100%;display:block">'+
    '</div>';
  }).join('');

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">'+
    '<title>Recibo Digital — '+sup.nome+'</title>'+
    '<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#fff}'+
    '@media print{@page{margin:0}.no-print{display:none}}'+
    '.no-print{position:fixed;bottom:16px;right:16px;z-index:99}'+
    '</style></head><body>'+
    '<div class="no-print">'+
      '<button onclick="window.print()" style="background:#2563EB;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(37,99,235,0.3)">🖨 Imprimir / Salvar PDF</button>'+
    '</div>'+
    pagesHtml+
    '<scr'+'ipt>setTimeout(function(){window.print();},600);<'+'/script>'+
  '</body></html>';

  var win = window.open('','_blank','width=900,height=700');
  win.document.write(html);
  win.document.close();
  win.focus();
}

function removeAnexo(stepId){
  var sup=getMonth(nav.year,nav.month).suppliers[nav.sup];
  if(sup.stepData&&sup.stepData[stepId]){delete sup.stepData[stepId].anexo;delete sup.stepData[stepId].anexo_name;}
  saveDB();renderFlow();
}

function swTab(tid,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
  btn.classList.add('active');document.getElementById(tid).classList.add('active');
}

// Info popover
function toggleInfoPop(e,stepId){
  e.stopPropagation();
  var pop=document.getElementById('info-pop');
  var btn=document.getElementById('ib-'+stepId);
  if(_activeInfoBtn===stepId){pop.classList.remove('show');btn.classList.remove('active');_activeInfoBtn=null;return;}
  if(_activeInfoBtn!==null){var pb=document.getElementById('ib-'+_activeInfoBtn);if(pb)pb.classList.remove('active');}
  var s=STEPS.find(function(x){return x.id===stepId;});
  pop.innerHTML='<div class="info-pop-title">Atividades</div>'+
    s.detail.map(function(d){return '<div class="info-pop-item"><span class="ip-dot"></span>'+d+'</div>';}).join('')+
    '<div class="info-pop-title">Pontos de atenção</div>'+
    s.atencao.map(function(a){return '<div class="info-pop-item"><span class="ip-dot alert"></span><span style="color:var(--red)">'+a+'</span></div>';}).join('');
  var rect=btn.getBoundingClientRect();
  var pw=280,left=rect.right+8;
  if(left+pw>window.innerWidth-12) left=rect.left-pw-8;
  pop.style.left=Math.max(8,left)+'px';pop.style.top=Math.max(8,rect.top-4)+'px';
  pop.classList.add('show');btn.classList.add('active');_activeInfoBtn=stepId;
}
document.addEventListener('click',function(){
  var pop=document.getElementById('info-pop');if(pop) pop.classList.remove('show');
  if(_activeInfoBtn!==null){var b=document.getElementById('ib-'+_activeInfoBtn);if(b)b.classList.remove('active');_activeInfoBtn=null;}
});

// Startup — mostra imediatamente com dados locais, sincroniza em background
render();
loadFromSheets(function(){ render(); });
</script>
